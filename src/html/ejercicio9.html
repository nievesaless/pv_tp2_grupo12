<!DOCTYPE html>
<html lang="es">
<head>

    <title>Bienvenid@ a Programación Visual</title>
</head>
<body>
    <script>
        // Solicitar apellido y nombre del usuario
        let apellido = prompt("Ingrese su apellido:");
        let nombre = prompt("Ingrese su nombre:");

        // Mostrar el mensaje de bienvenida mediante una alerta
        alert(`¡Hola ${nombre} ${apellido}! Bienvenido a Programación Visual.`);
    </script>
</body>
