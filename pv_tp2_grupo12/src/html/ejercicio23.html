<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texto en Tiempo Real</title>
    <!-- Vinculamos el archivo CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Escribe tu mensaje:</h2>
        <!-- Input para que el usuario escriba -->
        <input type="text" id="userInput" placeholder="Escribe aquí...">
        
        <!-- Párrafo donde se mostrará el texto en tiempo real -->
        <p id="textoMostrado">Tu texto aparecerá aquí...</p>
    </div>

    <!-- Vinculamos el archivo JavaScript al final del body -->
    <script src="main.js" type="module"></script>
</body>
</html>
