<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paises De America</title>
  <link rel="shortcut icon" href="../assets/images/img-america.webp" type="image/x-icon">
  <link rel="stylesheet" href="/pv_tp2_grupo12/src/css/ejercicio21.css">
</head>

<body>
  <h1 class="Titulo">Seleccionar País y Capital</h1>
  <div>
    <div>
      <label for="pais">Paises</label>
      <select name="pais" id="pais">
        <option value="" selected>Seleccione un Pais</option>
        <option id="arg" value="arg">Argentina</option>
        <option id="br" value="br">Brasil</option>
        <option id="bol" value="bol">Bolivia</option>
        <option id="col" value="col">Colombia</option>
        <option id="ch" value="ch">Chile</option>
        <option id="ecu" value="ecu">Ecuador</option>
        <option id="par" value="par">Paraguay</option>
        <option id="per" value="per">Peru</option>
        <option id="uru" value="uru">Uruguay</option>
        <option id="ven" value="ven">Venezuela</option>
      </select>
    </div>
    <div>
      <label for="capital">Capital</label>
      <select name="capital" id="capital">
        <option value="" selected>Seleccione una Capital</option>
        <option id="buenosaires" value="buenosaires">Buenos Aire</option>
        <option id="brasilia" value="brasilia">Brasilia</option>
        <option id="la_paz" value="la_paz">La Paz</option>
        <option id="bogota" value="bogota">Bogotá</option>
        <option id="stago_de_chile" value="stago_de_chile">Stago. de Chile</option>
        <option id="quito" value="quito">Quito</option>
        <option id="paraguay" value="paraguay">Paraguay</option>
        <option id="lima" value="lima">Lima</option>
        <option id="monte_video" value="monte_video">Monte Video</option>
        <option id="caracas" value="caracas">Caracas</option>
      </select>
    </div>
  </div>
  <script type="module" src="../js/ejercicio21.js"></script>
</body>

</html>
