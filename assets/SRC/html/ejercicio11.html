<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 11 - Consumo</title>
</head>
<body>
    <script>
        // Función flecha para calcular el consumo por km
        const calcularConsumo = (litros, kilometros) => litros / kilometros;

        const kmRecorridos = parseFloat(prompt("Ingrese el número de kilómetros recorridos:"));
        const litrosConsumidos = parseFloat(prompt("Ingrese el número de litros consumidos:"));

        if (kmRecorridos > 0) {
            const consumo = calcularConsumo(litrosConsumidos, kmRecorridos);
            document.write(`<h1>Cálculo de Consumo</h1>`);
            document.write(`<p>Para un recorrido de ${kmRecorridos} km con ${litrosConsumidos} litros...</p>`);
            document.write(`<h3>El consumo de combustible por kilómetro es: ${consumo.toFixed(2)} l/km.</h3>`);
        } else {
            document.write("<h3>Error: Los kilómetros deben ser mayores a 0.</h3>");
        }
    </script>
</body>
</html>
